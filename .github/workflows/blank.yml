name: Create Release
on:
  push:
    branches:
      - main
jobs:
  versioning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: 'blob:none'
      - name: Git Semantic Version
        uses: PaulHatch/semantic-version@v6.0.2
